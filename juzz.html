<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="css/navbar_sombre.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #cardJuzz{
        width:350px;
        height:250px;
        border:1px solid;
        background-color:gold;
        display:none;
     }
</style>
<body>
    <header id="header">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" id="left">Retour à l'Acceuil</a>
                <h3 id="right"></h3>
            </div>
            <br>
            <ul id="nav-links">

            </ul>
        </nav>
    </header>
    <br>
<select id="select">
    <option value="">--Sélectionner--</option>
    <option value="1">Juzz1</option>
    <option value="2">Juzz2</option>
    <option value="3">Juzz3</option>
    <option value="4">Juzz4</option>
</select>
    <div id="cardJuzz">
        <h1 id="Juzz"></h1>
        <h1 id="debut"></h1>
        <h1 id="fin"></h1>
        <h1 id="ayat"></h1>
    </div>
</body>
<script>
    const values = {  
        1: {
            Juzz: "Juzz1",
            debut: "1",
            fin: "2",
            ayat: "Bonjour" 
        },
        2: { 
            Juzz: "Juzz2",
            debut: "2",
            fin: "4",
            ayat: 7
        }
    };
    const select = document.getElementById("select");
    const Juzz = document.getElementById("Juzz");
    const debut = document.getElementById("debut");
    const fin = document.getElementById("fin");
    const ayat = document.getElementById("ayat");
    const div = document.getElementById("cardJuzz");

    select.addEventListener("change", function(){ 
        const selectedValue = select.value;
        Juzz.textContent = "Juzz: " + values[selectedValue].Juzz;
        debut.textContent = "Début: " + values[selectedValue].debut;
        fin.textContent = "Fin: " + values[selectedValue].fin;
        ayat.textContent = "Ayat: " + values[selectedValue].ayat;
        div.style.display = "block";
    });
</script>
<script src="js/navbar.js"></script>
</html>
